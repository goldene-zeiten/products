# Shipped catalog routing for the goldene-zeiten/products Site Set.
#
# Native on TYPO3 14.1+: automatically merged into any site declaring
# `dependencies: [goldene-zeiten/products]`, per core's "route enhancers in site sets"
# feature (Feature-107837). On TYPO3 13.4 this same file is read and injected by
# Core13/Routing/SiteSetRouteEnhancerListener.php, so this file is the single source of
# truth for both supported core versions.
#
# Category listing: /{category1}, /{category1}/{category2}, /{category1}/{category2}/{category3}
# (max depth 3). A category's own segment is only present when it does not have
# "hide_in_slug_path" set - PersistedAliasMapper matches by slug value only, so hidden
# categories simply never contribute a segment; no special routing config is needed for that.
#
# Product detail ships in "replace" mode by default: the product's own slug is always
# reachable, and an article's own slug can additionally sit in that *same* position
# (sibling, not nested) to deep-link a specific variant. See the "append" mode block
# commented out at the bottom of this file for the alternative, where an article instead
# nests one level under the product.
#
# limitToPages is intentionally not set here - it cannot be parameterized from this static
# file (target page UIDs are per-site, e.g. `products.pids.categoryPage`/`detailPage`
# settings). Add it via your own site's config.yaml routeEnhancers override if you need to
# restrict these enhancers to specific pages.

routeEnhancers:
  ProductsCategoryList:
    type: Extbase
    extension: Products
    plugin: CategoryList
    routes:
      -
        routePath: '/{category1}'
        _controller: 'Category::list'
        _arguments:
          category1: category
      -
        routePath: '/{category1}/{category2}'
        _controller: 'Category::list'
        _arguments:
          category2: category
      -
        routePath: '/{category1}/{category2}/{category3}'
        _controller: 'Category::list'
        _arguments:
          category3: category
    aspects:
      category1:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug
      category2:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug
      category3:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug

  ProductsDetail:
    type: Extbase
    extension: Products
    plugin: ProductDetail
    routes:
      -
        routePath: '/{product}'
        _controller: 'Product::show'
        _arguments:
          product: product
      -
        routePath: '/{category1}/{product}'
        _controller: 'Product::show'
        _arguments:
          category1: category
          product: product
      -
        routePath: '/{category1}/{category2}/{product}'
        _controller: 'Product::show'
        _arguments:
          category2: category
          product: product
      -
        routePath: '/{category1}/{category2}/{category3}/{product}'
        _controller: 'Product::show'
        _arguments:
          category3: category
          product: product
      -
        routePath: '/{article}'
        _controller: 'Product::show'
        _arguments:
          article: selectedArticle
      -
        routePath: '/{category1}/{article}'
        _controller: 'Product::show'
        _arguments:
          category1: category
          article: selectedArticle
      -
        routePath: '/{category1}/{category2}/{article}'
        _controller: 'Product::show'
        _arguments:
          category2: category
          article: selectedArticle
      -
        routePath: '/{category1}/{category2}/{category3}/{article}'
        _controller: 'Product::show'
        _arguments:
          category3: category
          article: selectedArticle
    aspects:
      category1:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug
      category2:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug
      category3:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_category
        routeFieldName: slug
      product:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_product
        routeFieldName: slug
      article:
        type: PersistedAliasMapper
        tableName: tx_products_domain_model_article
        routeFieldName: slug

# --- "append" mode alternative -----------------------------------------------------
# To nest an article one level under the product instead (.../product/article) rather
# than at the product's own position (.../article), override the ProductsDetail
# enhancer wholesale in your own site's config.yaml with the block below. Site-level
# config always takes precedence over the set-shipped preset above.
#
# routeEnhancers:
#   ProductsDetail:
#     type: Extbase
#     extension: Products
#     plugin: ProductDetail
#     routes:
#       - routePath: '/{product}'
#         _controller: 'Product::show'
#         _arguments: { product: product }
#       - routePath: '/{category1}/{product}'
#         _controller: 'Product::show'
#         _arguments: { category1: category, product: product }
#       - routePath: '/{category1}/{category2}/{product}'
#         _controller: 'Product::show'
#         _arguments: { category2: category, product: product }
#       - routePath: '/{category1}/{category2}/{category3}/{product}'
#         _controller: 'Product::show'
#         _arguments: { category3: category, product: product }
#       - routePath: '/{product}/{article}'
#         _controller: 'Product::show'
#         _arguments: { product: product, article: selectedArticle }
#       - routePath: '/{category1}/{product}/{article}'
#         _controller: 'Product::show'
#         _arguments: { category1: category, product: product, article: selectedArticle }
#       - routePath: '/{category1}/{category2}/{product}/{article}'
#         _controller: 'Product::show'
#         _arguments: { category2: category, product: product, article: selectedArticle }
#       - routePath: '/{category1}/{category2}/{category3}/{product}/{article}'
#         _controller: 'Product::show'
#         _arguments: { category3: category, product: product, article: selectedArticle }
#     aspects:
#       category1: { type: PersistedAliasMapper, tableName: tx_products_domain_model_category, routeFieldName: slug }
#       category2: { type: PersistedAliasMapper, tableName: tx_products_domain_model_category, routeFieldName: slug }
#       category3: { type: PersistedAliasMapper, tableName: tx_products_domain_model_category, routeFieldName: slug }
#       product: { type: PersistedAliasMapper, tableName: tx_products_domain_model_product, routeFieldName: slug }
#       article: { type: PersistedAliasMapper, tableName: tx_products_domain_model_article, routeFieldName: slug }
