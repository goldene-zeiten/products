services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  GoldeneZeiten\Products\:
    resource: '../Classes/*'
    exclude: '../Classes/Exception/*'

  # CategoryDiscountPriceProvider composes GraduatedPriceProvider as its own fallback
  # (constructor injection of the concrete class, not the interface), which in turn composes
  # ProductPriceProvider the same way - so this alias is the only place the full pricing chain
  # (quantity tiers, then whichever of the category-cascading or per-shopper discount is bigger)
  # is decided. Replaces the former UserGroupDiscountPriceProvider binding (M7): the FE-usergroup
  # discount lookup now lives inline here so both discount sources can be compared - taking the
  # single best rate, not stacking them - before either is applied.
  GoldeneZeiten\Products\Pricing\PriceProviderInterface:
    alias: GoldeneZeiten\Products\Pricing\CategoryDiscountPriceProvider

  # DataHandler's classic hooks (registered in ext_localconf.php via
  # $GLOBALS['TYPO3_CONF_VARS']['SC_OPTIONS']) are fetched with
  # GeneralUtility::makeInstance() from code that isn't itself a DI-resolved
  # service, so the container needs this to be public to hand it out - a
  # private service can only be injected as another service's dependency.
  GoldeneZeiten\Products\Hooks\CategoryMountAccessHook:
    public: true

  # EXT:install resolves upgrade wizards via its tagged_locator (keyed by the #[UpgradeWizard]
  # identifier, not the class name), so production code never needs these public. Functional
  # tests instantiate a wizard directly via $this->get(ClassName::class) though, which only
  # works for public services.
  GoldeneZeiten\Products\Updates\:
    resource: '../Classes/Updates/*UpgradeWizard.php'
    public: true

  # PrerequisiteCollection::add() (core, called from UpgradeWizardRunCommand) fetches these via
  # GeneralUtility::makeInstance() by class name directly, the same lookup pattern as the
  # UpgradeWizard classes above, so they need the same public: true.
  GoldeneZeiten\Products\Updates\Prerequisites\:
    resource: '../Classes/Updates/Prerequisites/*'
    public: true

  # OrderExportRegistry is an extension point with no bundled consumer in EXT:products itself
  # (real exporters ship in separate, format-specific extensions) - without public: true, Symfony's
  # dead-code elimination would strip the unreferenced service before compilation finishes.
  GoldeneZeiten\Products\Export\OrderExportRegistry:
    public: true
