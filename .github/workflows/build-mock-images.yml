name: Build mock images

# Builds the dev/test mock server images kept under Build/mocks/ and publishes them to the GitHub
# Container Registry, so contributors pull a ready-to-run mock instead of building it. Rebuilds only when
# a mock changes (path filter) or on manual dispatch - the images are dev tooling, not release artifacts.
on:
  push:
    branches:
      - main
    paths:
      - 'Build/mocks/**'
      - '.github/workflows/build-mock-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: Build/mocks/ups-rating
            image: ghcr.io/goldene-zeiten/products-ups-rating-mock
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build and push ${{ matrix.image }}"
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:latest
