name: split packages

# Mirrors every package in this monorepo into its own read-only repository, so
# Packagist and TER can identify each extension as a package of its own. The
# monorepo stays the single source of truth: never commit into a split
# repository, its history is overwritten from here.
#
# A tagged release propagates the tag to every split repository, which is what
# Packagist publishes as a release; pushes to main keep their dev-main branches
# current in between.

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  split:
    name: "split ${{ matrix.package }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add one entry per package. `directory` is the path inside this
          # monorepo, `repository` the read-only target in the same organisation.
          - package: products-core
            directory: packages/goldene-zeiten/products-core
            repository: products-core
          - package: products-search
            directory: packages/goldene-zeiten/products-search
            repository: products-search
          - package: products-solr
            directory: packages/goldene-zeiten/products-solr
            repository: products-solr
          - package: products-recently-viewed
            directory: packages/goldene-zeiten/products-recently-viewed
            repository: products-recently-viewed
          - package: products-wishlist
            directory: packages/goldene-zeiten/products-wishlist
            repository: products-wishlist
          - package: products-credit-points
            directory: packages/goldene-zeiten/products-credit-points
            repository: products-credit-points
          - package: products-voucher
            directory: packages/goldene-zeiten/products-voucher
            repository: products-voucher
          - package: products-watermark
            directory: packages/goldene-zeiten/products-watermark
            repository: products-watermark
          - package: products-shipping-ups
            directory: packages/goldene-zeiten/products-shipping-ups
            repository: products-shipping-ups
          - package: products-shipping-dhl-express
            directory: packages/goldene-zeiten/products-shipping-dhl-express
            repository: products-shipping-dhl-express
          - package: products-api-client
            directory: packages/goldene-zeiten/products-api-client
            repository: products-api-client
          - package: products-payment-paypal
            directory: packages/goldene-zeiten/products-payment-paypal
            repository: products-payment-paypal
          - package: products-payment-stripe
            directory: packages/goldene-zeiten/products-payment-stripe
            repository: products-payment-stripe
          - package: products-payment-klarna
            directory: packages/goldene-zeiten/products-payment-klarna
            repository: products-payment-klarna
          - package: products-payment-amazon
            directory: packages/goldene-zeiten/products-payment-amazon
            repository: products-payment-amazon
          - package: products-express-stripe
            directory: packages/goldene-zeiten/products-express-stripe
            repository: products-express-stripe
          - package: products-express-paypal
            directory: packages/goldene-zeiten/products-express-paypal
            repository: products-express-paypal
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          # The split needs the full history, not just the tip commit.
          fetch-depth: 0

      - name: "Split ${{ matrix.directory }} into goldene-zeiten/${{ matrix.repository }}"
        uses: danharrin/monorepo-split-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.MONOREPO_SPLIT_TOKEN }}
        with:
          package_directory: ${{ matrix.directory }}
          repository_organization: goldene-zeiten
          repository_name: ${{ matrix.repository }}
          user_name: "goldene-zeiten-bot"
          user_email: "noreply@goldene-zeiten.de"
          # Only set on tag pushes: this is what Packagist publishes as a release.
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      # The monorepo-split action exits 0 even when its git push is rejected - an empty target repository,
      # a token without access to that repository, or a token missing the `workflow` scope needed to push
      # each package's .github/workflows/publish.yml all leave the mirror empty or frozen at an older commit
      # while the step above still reports success. This check is the real gate: it clones the mirror and
      # fails the job unless its content byte-matches the package directory that was just split.
      - name: "Verify goldene-zeiten/${{ matrix.repository }} received the split"
        run: |
          set -euo pipefail
          mirror="https://github.com/goldene-zeiten/${{ matrix.repository }}.git"
          work="$(mktemp -d)"
          if ! git clone --quiet --depth 1 "$mirror" "$work/mirror"; then
            echo "::error title=Split not delivered::goldene-zeiten/${{ matrix.repository }} could not be cloned - the split did not deliver it (missing repository, or the token lacks access to it)."
            exit 1
          fi
          rm -rf "$work/mirror/.git"
          if ! diff -rq -x '.git' -x 'Documentation-GENERATED-temp' "${{ matrix.directory }}" "$work/mirror"; then
            echo "::error title=Split out of sync::goldene-zeiten/${{ matrix.repository }} does not match ${{ matrix.directory }} - the push in the split step above did not land (token repository access, the 'workflow' scope for publish.yml, or branch protection)."
            exit 1
          fi
          echo "goldene-zeiten/${{ matrix.repository }} is in sync with ${{ matrix.directory }}."
