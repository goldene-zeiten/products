name: tests core 14

on:
  pull_request:
  workflow_dispatch:

jobs:
  code-quality:
    name: "code quality with core v14"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v14"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Validate composer.json"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s composer -- validate --strict --no-check-lock"

      - name: "Run PHP lint"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s lintPhp"

      - name: "Validate CGL"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s cgl -n"

      - name: "Ensure UTF-8 files do not contain BOM"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s checkBom"

      - name: "Find duplicate exception codes"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s checkExceptionCodes"

      - name: "Validate XLIFF files"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s checkIntegrityXliff"

      - name: "Validate RST files"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s checkRst"

      - name: "Lint TypoScript"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s lintTypoScript"

      - name: "Run PHPStan"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s phpstan"

      - name: "Install npm dependencies"
        run: "Build/Scripts/runTests.sh -b podman -s npmInstall"

      - name: "Run JavaScript/TypeScript lint"
        run: "Build/Scripts/runTests.sh -b podman -s lintJs -n"

      - name: "Build JavaScript/TypeScript assets"
        run: "Build/Scripts/runTests.sh -b podman -s buildJs"

  unit:
    name: unit tests with core v14
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.4' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v14"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Unit"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s unit"

  functional:
    name: functional tests with core v14
    runs-on: ubuntu-22.04
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.4' ]
        db:
          - { name: 'SQLite', options: '-d sqlite' }
          - { name: 'MariaDB 10.5 mysqli', options: '-d mariadb -a mysqli' }
          - { name: 'MariaDB 10.5 pdo_mysql', options: '-d mariadb -a pdo_mysql' }
          - { name: 'MySQL 8.0 mysqli', options: '-d mysql -a mysqli' }
          - { name: 'MySQL 8.0 pdo_mysql', options: '-d mysql -a pdo_mysql' }
          - { name: 'PostgreSQL 10', options: '-d postgres' }
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v14"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Functional ${{ matrix.db.name }}"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -p ${{ matrix.php-version }} -s functional ${{ matrix.db.options }}"

  acceptance:
    name: acceptance tests with core v14
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        sql-version: [ 'sqlite', 'mariadb' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Acceptance MariaDB"
        run: "Build/Scripts/runTests.sh -b podman -t 14 -s acceptance -d ${{ matrix.sql-version }}"
