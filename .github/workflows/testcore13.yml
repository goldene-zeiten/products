name: tests core 13

on:
  pull_request:
  workflow_dispatch:

jobs:
  code-quality:
    name: "code quality with core v13"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Validate composer.json"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s composer -- validate --strict --no-check-lock"

      - name: "Run PHP lint"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s lintPhp"

      - name: "Validate CGL"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s cgl -n"

      - name: "Ensure UTF-8 files do not contain BOM"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s checkBom"

      - name: "Find duplicate exception codes"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s checkExceptionCodes"

      - name: "Validate XLIFF files"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s checkIntegrityXliff"

      - name: "Validate RST files"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s checkRst"

      - name: "Lint TypoScript"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s lintTypoScript"

      - name: "Run PHPStan"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s phpstan"

      - name: "Install npm dependencies"
        run: "Build/Scripts/runTests.sh -b podman -s npmInstall"

      - name: "Run JavaScript/TypeScript lint"
        run: "Build/Scripts/runTests.sh -b podman -s lintJs -n"

      - name: "Build JavaScript/TypeScript assets"
        run: "Build/Scripts/runTests.sh -b podman -s buildJs"

  unit:
    name: unit tests with core v13
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.5' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Unit"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s unit"

  functional-setup:
    name: "prepare functional dependencies with core v13"
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.5' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      # The whole functional matrix runs against this identical build, so install once per PHP version and
      # hand the result to every DB variant. tar keeps the path-repository symlinks under .Build intact.
      - name: "Pack the built dependencies"
        run: "tar -c -f functional-build.tar .Build"

      - name: "Upload the built dependencies"
        uses: actions/upload-artifact@v4
        with:
          name: "functional-build-v13-php${{ matrix.php-version }}"
          path: "functional-build.tar"
          retention-days: 1
          if-no-files-found: error

  functional:
    name: functional tests with core v13
    runs-on: ubuntu-22.04
    needs: [ unit, functional-setup ]
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.5' ]
        db:
          - { name: 'SQLite', options: '-d sqlite' }
          - { name: 'MariaDB 10.5 mysqli', options: '-d mariadb -a mysqli' }
          - { name: 'MariaDB 10.5 pdo_mysql', options: '-d mariadb -a pdo_mysql' }
          - { name: 'MySQL 8.0 mysqli', options: '-d mysql -a mysqli' }
          - { name: 'MySQL 8.0 pdo_mysql', options: '-d mysql -a pdo_mysql' }
          - { name: 'PostgreSQL 10', options: '-d postgres' }
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Download the prepared dependencies"
        uses: actions/download-artifact@v4
        with:
          name: "functional-build-v13-php${{ matrix.php-version }}"

      - name: "Unpack the prepared dependencies"
        run: "tar -x -f functional-build.tar && rm functional-build.tar"

      - name: "Functional ${{ matrix.db.name }}"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -p ${{ matrix.php-version }} -s functional ${{ matrix.db.options }}"

  acceptance:
    name: acceptance tests with core v13
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        sql-version: [ 'sqlite', 'mariadb' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Acceptance SQLite"
        run: "Build/Scripts/runTests.sh -b podman -t 13 -s acceptance -d ${{ matrix.sql-version }}"
