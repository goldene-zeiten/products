<html>
<head>
    <style>
        body { font-family: sans-serif; font-size: 12px; color: #222; }
        h1 { font-size: 20px; }
        table { width: 100%; }
    </style>
</head>
<body>
<h1><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:invoice_title" /></h1>

<table style="margin-bottom: 20px;">
    <tr>
        <td><strong><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:invoice_number" /></strong>: {order.invoiceNumber}</td>
        <td><strong><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:order_number" /></strong>: {order.orderNumber}</td>
        <td><strong><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:order_date" /></strong>: {order.orderDate -> f:format.date(format: 'd.m.Y')}</td>
    </tr>
</table>

<f:render partial="Invoice/AddressBlock" arguments="{order: order}" />
<f:render partial="Invoice/LineItems" arguments="{order: order}" />

<table style="width: 100%; margin-top: 12px;">
    <tr>
        <td style="width: 70%;"></td>
        <td style="text-align: right; padding: 2px;"><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:subtotal_net" /></td>
        <td style="text-align: right; padding: 2px; width: 100px;">{order.totalNet.decimalString} {order.currency}</td>
    </tr>
    <tr>
        <td></td>
        <td style="text-align: right; padding: 2px;"><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:tax" /></td>
        <td style="text-align: right; padding: 2px;">{order.totalTax.decimalString} {order.currency}</td>
    </tr>
    <f:if condition="{order.shippingMethod}">
        <tr>
            <td></td>
            <td style="text-align: right; padding: 2px;"><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:shipping" /></td>
            <td style="text-align: right; padding: 2px;">{order.shippingTotal.decimalString} {order.currency}</td>
        </tr>
    </f:if>
    <tr>
        <td></td>
        <td style="text-align: right; padding: 2px; border-top: 1px solid #000;"><strong><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:total_gross" /></strong></td>
        <td style="text-align: right; padding: 2px; border-top: 1px solid #000;"><strong>{order.totalGross.decimalString} {order.currency}</strong></td>
    </tr>
</table>

<p style="margin-top: 30px;"><f:translate key="LLL:EXT:products/Resources/Private/Language/locallang_invoice.xlf:footer_note" /></p>
</body>
</html>
