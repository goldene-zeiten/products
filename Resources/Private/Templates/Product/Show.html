<div class="product-detail">
    <h1>{product.title}</h1>
    <f:if condition="{product.subtitle}">
        <h2 class="text-muted">{product.subtitle}</h2>
    </f:if>

    <f:render partial="Product/Gallery" arguments="{images: product.images}" />

    <div class="row mt-4">
        <div class="col-md-6">
            <f:format.html>{product.description}</f:format.html>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <f:if condition="{product.articles}">
                    <f:render partial="Product/ArticleSelector" arguments="{product: product, variantAttributes: variantAttributes}" />
                </f:if>

                <f:render partial="Product/PriceAndStock" arguments="{product: product, selectedArticle: selectedArticle}" />

                <f:render partial="Product/WishlistToggle" arguments="{product: product, wishlistEnabled: wishlistEnabled, wishlistProductUids: wishlistProductUids}" />

                <f:render partial="Product/AccessoryProducts" arguments="{accessoryProducts: product.accessoryProducts}" />
            </div>
        </div>
    </div>

    <f:render partial="Product/Downloads" arguments="{downloads: product.downloads}" />

    <f:render partial="Product/RelatedProducts" arguments="{relatedProducts: product.relatedProducts}" />
</div>
