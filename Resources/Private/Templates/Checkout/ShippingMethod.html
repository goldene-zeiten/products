<div class="checkout-shipping-method">
    <h2><f:translate key="checkout_shipping_method" /></h2>
    <f:form action="submitShippingMethod">
        <f:for each="{shippingOptions}" as="option">
            <div class="form-check">
                <f:form.radio name="shippingOption" value="{option.key}" checked="{f:if(condition: '\'{selectedShippingOption}\' == \'{option.key}\'', then: '1')}" class="form-check-input" id="shipping-option-{option.key}" />
                <label class="form-check-label" for="shipping-option-{option.key}">
                    {option.label} - {option.cost.decimalString}
                    <f:if condition="{option.deliveryEstimate}">
                        <f:then><span class="text-muted">({option.deliveryEstimate})</span></f:then>
                    </f:if>
                </label>
            </div>
        </f:for>
        <div class="mt-3">
            <f:form.submit value="{f:translate(key: 'continue_to_payment')}" class="btn btn-primary" />
        </div>
    </f:form>
</div>
