<div class="checkout-review">
    <h2><f:translate key="checkout_review" /></h2>
    
    <div class="row">
        <div class="col-md-6">
            <h4><f:translate key="billing_address" /></h4>
            <p>
                {address.firstName} {address.lastName}<br>
                {address.street}<br>
                {address.zip} {address.city}<br>
                {address.country}
            </p>
        </div>
        <div class="col-md-6">
            <h4><f:translate key="payment_method" /></h4>
            <p>{paymentMethod.label}</p>
        </div>
    </div>

    <div class="mt-4">
        <f:render partial="Order/Summary" arguments="{summary: basket}" />
    </div>
    
    <div class="mt-4">
        <f:form action="finalize">
            <f:if condition="{creditPointsBalance} > 0">
                <div class="mb-3">
                    <label for="spendPoints"><f:translate key="credit_points_balance" arguments="{0: creditPointsBalance}" /></label>
                    <f:form.textfield name="spendPoints" additionalAttributes="{type: 'number', min: 0, max: creditPointsBalance}" value="0" class="form-control" id="spendPoints" />
                    <span class="form-text"><f:translate key="credit_points_spend_label" /></span>
                </div>
            </f:if>
            <f:form.submit value="{f:translate(key: 'place_order')}" class="btn btn-success btn-lg" />
        </f:form>
    </div>
</div>
