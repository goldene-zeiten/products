<div class="checkout-review">
    <h2><f:translate key="checkout_review" /></h2>
    
    <div class="row">
        <div class="col-md-6">
            <h4><f:translate key="billing_address" /></h4>
            <p>
                {address.firstName} {address.lastName}<br>
                {address.street}<br>
                {address.zip} {address.city}<br>
                {address.country}
            </p>
        </div>
        <div class="col-md-6">
            <h4><f:translate key="payment_method" /></h4>
            <p>{paymentMethod.title}</p>
        </div>
    </div>

    <div class="mt-4">
        <f:render partial="Order/Summary" arguments="{summary: basket}" />
    </div>
    
    <div class="mt-4">
        <f:form action="finalize">
            <f:form.submit value="{f:translate(key: 'place_order')}" class="btn btn-success btn-lg" />
        </f:form>
    </div>
</div>
