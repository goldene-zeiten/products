<div class="category-list">
    <f:if condition="{ancestorChain}">
        <f:then>
            <nav class="breadcrumb">
                <f:for each="{ancestorChain}" as="ancestor" iteration="iterator">
                    <span>{ancestor.title}</span><f:if condition="{iterator.isLast} == 0"><f:then> / </f:then></f:if>
                </f:for>
            </nav>
        </f:then>
    </f:if>
    <f:if condition="{products}">
        <f:then>
            <div class="row">
                <f:for each="{products}" as="product">
                    <div class="col-md-4">
                        <div class="product-list-item card mb-4">
                            <div class="card-body">
                                <h5 class="card-title">{product.title}</h5>
                                <f:render partial="Product/Price" arguments="{price: product.price}" />
                                <f:link.action controller="Product" action="show" pageUid="{settings.pids.detailPage}" arguments="{product: product}" class="btn btn-primary"><f:translate key="details" /></f:link.action>
                            </div>
                        </div>
                    </div>
                </f:for>
            </div>
        </f:then>
        <f:else>
            <p><f:translate key="no_products_found" /></p>
        </f:else>
    </f:if>
</div>
