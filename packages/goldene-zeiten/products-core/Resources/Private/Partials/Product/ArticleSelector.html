<f:asset.script identifier="products-article-selector" src="EXT:products_core/Resources/Public/JavaScript/article-selector.js" type="module" />
<div class="article-selector mt-3" data-product-variant-selector data-switch-mode="{settings.catalog.articleSwitchMode}">
    <h6><f:translate key="choose_variant" /></h6>
    <f:comment>
        Posted, not submitted as a GET: the chosen variant is user input the browser appends at submit
        time, so it could never carry a matching cHash, and exempting it from the cHash instead would
        hand an attacker cache-relevant parameters nobody validates.
    </f:comment>
    <f:form method="post" action="show" controller="Product" pageUid="{settings.pids.detailPage}" arguments="{product: product}">
        <f:if condition="{variantAttributes}">
            <f:then>
                <f:for each="{variantAttributes}" as="attribute">
                    <div class="mb-2">
                        <label>{attribute.title}</label>
                        <f:form.select
                            name="attributeValues[]"
                            options="{attribute.values}"
                            optionValueField="uid"
                            optionLabelField="value"
                            class="form-select variant-attribute-select"
                            additionalAttributes="{data-attribute-uid: attribute.uid}"
                        />
                    </div>
                </f:for>
            </f:then>
            <f:else>
                <div class="mb-3">
                    <f:form.select name="selectedArticle" options="{product.articles}" optionLabelField="title" class="form-select variant-article-select" />
                </div>
            </f:else>
        </f:if>

        <f:form.submit value="{f:translate(key: 'update_price')}" class="btn btn-secondary mb-3" />
    </f:form>
</div>
