<html data-namespace-typo3-fluid="true"
      xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
>
<f:if condition="{configuration}">
    <f:asset.script identifier="stripe-js" src="https://js.stripe.com/v3/" />
    <f:asset.script identifier="products-express-stripe"
                    src="EXT:products_express_stripe/Resources/Public/JavaScript/express-checkout.js" type="module" />
    <div class="products-express-checkout"
         data-stripe-express-checkout
         data-publishable-key="{configuration.publishableKey}"
         data-amount="{configuration.amount}"
         data-currency="{configuration.currency}"
         data-basket-token="{basketToken}"
         data-shipping-quote-url="{configuration.shippingQuoteUrl}"
         data-confirm-url="{f:uri.action(action: 'confirm', pageType: settings.confirm.pageType)}"
    ></div>
</f:if>
</html>
