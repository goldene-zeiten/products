openapi: 3.0.3
info:
  title: UPS mock (OAuth + Rating)
  version: '1.0'
  description: >-
    A single OpenAPI document combining the two UPS endpoints the products-shipping-ups extension calls
    (OAuth token + Rating "Shop"), so one Stoplight Prism instance serves both under one base URL, with
    example responses. Derived by hand from UPS's own specs pinned next to it (Rating.yaml,
    OAuthClientCredentials.yaml); refresh the example shapes when UPS changes the contract. It exists to
    exercise the HTTP path without UPS credentials or hitting real infrastructure.
servers:
  - url: http://localhost:4010
paths:
  /security/v1/oauth/token:
    post:
      summary: OAuth client-credentials token
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
      responses:
        '200':
          description: A bearer token.
          content:
            application/json:
              example:
                token_type: Bearer
                issued_at: '1752580000000'
                client_id: mock-client
                access_token: MOCK-ACCESS-TOKEN
                expires_in: '3599'
                status: approved
  /api/rating/v2409/Shop:
    post:
      summary: Shop for all available UPS rates
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Rated shipments.
          content:
            application/json:
              example:
                RateResponse:
                  Response:
                    ResponseStatus:
                      Code: '1'
                      Description: Success
                  RatedShipment:
                    - Service:
                        Code: '11'
                        Description: UPS Standard
                      TotalCharges:
                        CurrencyCode: EUR
                        MonetaryValue: '9.99'
                      GuaranteedDelivery:
                        BusinessDaysInTransit: '2'
                    - Service:
                        Code: '65'
                        Description: UPS Saver
                      TotalCharges:
                        CurrencyCode: EUR
                        MonetaryValue: '19.99'
                      GuaranteedDelivery:
                        BusinessDaysInTransit: '1'
